name: CI

on:
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - run: Install-Module -Name Microsoft.WinGet.Client -Force

      - run: winget install --id WireGuard.WireGuard --accept-source-agreements

      - name: Allow scripts
        run: Set-ExecutionPolicy Unrestricted -Scope CurrentUser -Force

      - name: Install Windows Terminal
        run: winget install --id Microsoft.WindowsTerminal --source winget --accept-source-agreements --accept-package-agreements

      - name: Enable file extensions
        run: Set-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" HideFileExt 0

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract zip directly to D drive
        run: Expand-Archive "$env:GITHUB_WORKSPACE\pack.zip" "D:\pack" -Force

      - name: Install Internet Archive CLI
        run: pipx install internetarchive

      - name: Install Free Download Manager
        run: winget install --id XPDLMKFTXTDHSD --source msstore --accept-package-agreements --accept-source-agreements

      - name: Kill Microsoft Edge
        run: taskkill /F /IM msedge.exe /T

      - name: Install OneDrive
        run: winget install --id Microsoft.OneDrive --accept-source-agreements --accept-package-agreements

      - name: Lower FDM priority
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          Get-Process | Where-Object { $_.ProcessName -like "*fdm*" } | ForEach-Object {
          $_.PriorityClass = "Idle"
          }

      - name: Delete folders (background)
        shell: powershell
        run: |
          Start-Process powershell -WindowStyle Hidden -ArgumentList "
            `$paths = @(
              'C:\Program Files (x86)\Android',
              'C:\Program Files (x86)\Windows Kits',
              'C:\Program Files (x86)\Microsoft SDKs',
              'C:\Program Files\Microsoft Visual Studio',
              'C:\Program Files\dotnet',
              'C:\Program Files\LLVM',
              'C:\Program Files\MongoDB',
              'C:\rtools45',
              'C:\Julia',
              'C:\Miniconda',
              'C:\mingw64',
              'C:\mingw32',
              'C:\Strawberry'
            )

            foreach (`$p in `$paths) {
              if (Test-Path `$p) {
                Remove-Item `$p -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
          "

      - name: Enable TS
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0

      - name: Set RDP Auth
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set Password
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText $env:PASSWORD -Force)

      - name: Install Cloudflared
        run: choco install cloudflared -y

      - name: Create Tunnel and Commit Log to Git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: powershell
        run: |
          # 1. Configure git credentials using the GITHUB_TOKEN
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${env:GH_TOKEN}@github.com/${env:REPO}.git"

          # Remove existing local log file if present
          if (Test-Path "cloudflared.log") { Remove-Item "cloudflared.log" -Force }

          # 2. Pass current directory ($PWD.Path) into the background job
          $workDir = $PWD.Path
          Start-Job -ScriptBlock {
            param($dir)
            Set-Location $dir

            $timeout = 60
            $elapsed = 0
            while ($elapsed -lt $timeout) {
              Start-Sleep -Seconds 2
              $elapsed += 2

              if (Test-Path "cloudflared.log") {
                $log = Get-Content "cloudflared.log" -Raw -ErrorAction SilentlyContinue
                if ($log -match 'https://[a-zA-Z0-9-]+\.trycloudflare\.com') {
                  
                  # Optionally remove old tracked file from git index if it exists
                  git rm --cached cloudflared.log -f 2>$null

                  # Add and commit the fresh log
                  git add cloudflared.log
                  git commit -m "chore: update tunnel log [skip ci]"
                  git push origin HEAD:main
                  break
                }
              }
            }
          } -ArgumentList $workDir

          # 3. Start cloudflared directly in foreground
          cloudflared tunnel --url tcp://localhost:3389 --protocol http2 --loglevel info --logfile cloudflared.log
